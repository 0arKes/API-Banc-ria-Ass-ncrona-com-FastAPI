services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_api
    ports:
      - "8000:8000"
    volumes:
      - ./BackendAPI:/app
    env_file:
      - BackendAPI/.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: